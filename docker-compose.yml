version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ai-postgres
    environment:
      POSTGRES_DB: ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    container_name: ai-ollama
    ports:
      - "11434:11434"

  springboot:
    build: .
    container_name: ai-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama