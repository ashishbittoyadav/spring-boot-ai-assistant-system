services:
  postgres:
    image: postgres:15
    container_name: ai-postgres
    environment:
      POSTGRES_DB: ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    container_name: ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - /Users/ashishyadav/.ollama/models:/root/.ollama/models

  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
    depends_on:
      - springboot

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  springboot:
    build: .
    container_name: ai-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama

# Declare the volume here
volumes:
  ollama-data: